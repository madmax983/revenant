                        <lightning-button label="Cancel" onclick={handleClosePauseModal} class="slds-m-right_small"></lightning-button>
                        <template if:true={pauseModalIsResume}>
                            <lightning-button label="Confirm Resume" variant="brand" icon-name="utility:play" onclick={handleConfirmPauseModal}></lightning-button>
                        </template>
                        <template if:false={pauseModalIsResume}>
                            <lightning-button label="Confirm Pause" variant="destructive" icon-name="utility:pause" onclick={handleConfirmPauseModal}></lightning-button>
                        </template>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
        </template>

        <!-- Launch Workflow Modal -->
        <template if:true={modalOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseModal}>
                            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close" variant="inverse"></lightning-icon>
                        </button>
                        <h2 class="slds-modal__title slds-hyphenate font-outfit">Run Workflow / Backfill</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <!-- Alert Banner for errors -->
                        <template if:true={launchError}>
                            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                                <h2>{launchError}</h2>
                            </div>
                        </template>

                        <lightning-combobox
                            name="launchName"
                            label="Workflow Definition"
                            placeholder="Select workflow class..."
                            value={launchName}
                            options={definitionOptions}
                            onchange={handleLaunchFieldChange}
                            required>
                        </lightning-combobox>

                        <lightning-input
                            name="launchKey"
                            label="Correlation Key (Unique)"
                            placeholder="e.g. Backfill_June_01"
                            value={launchKey}
                            onchange={handleLaunchFieldChange}
                            required>
                        </lightning-input>

                        <lightning-textarea
                            name="launchInputJson"
                            label="Input Payload (JSON)"
                            placeholder='e.g. { "records": [1, 2, 3] }'
                            value={launchInputJson}
                            onchange={handleLaunchFieldChange}
                            rows="6"
                            class="slds-m-top_small">
                        </lightning-textarea>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleCloseModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Execute Workflow" variant="brand" onclick={handleExecuteWorkflow} loading={executingLaunch} disabled={executingLaunch} class="brand-button"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
        </template>
    </div>
</template>
