                                                 title="Spawn a compensating workflow run to reverse side effects">
                                             </lightning-button>
                                         </template>
                                         <template if:true={isSuspended}>
                                             <lightning-button
                                                 label="Send Signal"
                                                 icon-name="utility:record"
                                                 variant="brand"
                                                 onclick={handleOpenSignalModal}
                                                 class="slds-m-right_small brand-button"
                                                 title="Inject a named signal into this suspended workflow instance"
                                                 data-id="send-signal-btn">
                                             </lightning-button>
                                         </template>
                                         <template if:true={isCancelable}>
                                             <lightning-button
                                                 label="Cancel Workflow"
                                                 icon-name="utility:close" 
                                                 variant="destructive" 
                                                 onclick={handleCancelWorkflow}
                                                 class="slds-m-right_small">
                                             </lightning-button>
                                         </template>
                                         <template if:true={selectedInst.waitingOn}>
                                             <span class={selectedInst.waitingOnBadgeClass} style="margin-right: 8px;">Waiting On: {selectedInst.waitingOn}</span>
                                         </template>
                                         <span class={selectedInst.statusBadgeClass}>{selectedInst.Status__c}</span>
                                    </div>
                                </div>

                                <!-- Instance Meta Fields Grid -->
                                <div class="slds-grid slds-wrap slds-m-bottom_large detail-fields-grid">
                                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                        <div class="slds-text-title slds-text-color_weak">Correlation Key</div>
                                        <div class="slds-text-body_regular">{selectedInst.Correlation_Key__c}</div>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                        <div class="slds-text-title slds-text-color_weak">Started Date</div>
                                        <div class="slds-text-body_regular">{selectedInst.formattedDate}</div>
                                    </div>
                                    <template if:true={selectedInst.Failure_Category__c}>
                                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                            <div class="slds-text-title slds-text-color_weak">Failure Category</div>
                                            <div class="slds-text-body_regular">
                                                <span class="badge badge-red">{selectedInst.failureCategoryLabel}</span>
                                            </div>
                                        </div>
                                    </template>
                                    <template if:true={selectedInst.formattedDeadline}>
                                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                            <div class="slds-text-title slds-text-color_weak">Execution Deadline</div>
                                            <div class="slds-text-body_regular">{selectedInst.formattedDeadline}</div>
                                        </div>
                                    </template>
                                    <template if:true={selectedInst.Parent_Instance__c}>
                                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                            <div class="slds-text-title slds-text-color_weak">Parent Workflow</div>
                                            <div class="slds-text-body_regular">
                                                <button type="button" data-id={selectedInst.Parent_Instance__c} onclick={handleSelectRelatedInstance} class="slds-button link-button">
                                                    {selectedInst.Parent_Instance__r.Name}
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                    <template if:true={selectedInst.Previous_Instance__c}>
                                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                            <div class="slds-text-title slds-text-color_weak">Previous Run</div>
                                            <div class="slds-text-body_regular">
                                                <button type="button" data-id={selectedInst.Previous_Instance__c} onclick={handleSelectRelatedInstance} class="slds-button link-button">
                                                    {selectedInst.Previous_Instance__r.Name}
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                    <template if:true={successor}>
                                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                            <div class="slds-text-title slds-text-color_weak">Next Run</div>
                                            <div class="slds-text-body_regular">
                                                <button type="button" data-id={successor.Id} onclick={handleSelectRelatedInstance} class="slds-button link-button">
                                                    {successor.Name}
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                    <template if:true={selectedInst.Compensated_By__c}>
                                        <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                                            <div class="slds-text-title slds-text-color_weak">Compensated By</div>
                                            <div class="slds-text-body_regular">
                                                <button type="button" data-id={selectedInst.Compensated_By__c} onclick={handleSelectRelatedInstance} class="slds-button link-button">
                                                    {selectedInst.Compensated_By__r.Name}
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                    <template if:true={selectedInst.attributes}>
                                        <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                                            <div class="slds-text-title slds-text-color_weak slds-m-bottom_xx-small">Business Attributes</div>
                                            <div class="slds-grid slds-wrap">
                                                <template for:each={selectedInst.attributes} for:item="attr">
                                                    <span key={attr.Id} class="slds-badge attribute-badge slds-m-right_xx-small slds-m-bottom_xx-small">
                                                        {attr.Key__c}={attr.Value__c}
                                                    </span>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                    <template if:true={selectedInst.Input__c}>
                                        <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                                            <div class="slds-text-title slds-text-color_weak">Workflow Input</div>
                                            <pre class="code-block">{selectedInst.Input__c}</pre>
                                            <template if:true={selectedInst.inputFile}>
                                                <a href={selectedInst.inputFile.url} target="_blank" rel="noopener" class="slds-text-body_small">{selectedInst.inputFile.label}</a>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:true={selectedInst.Output__c}>
                                        <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                                            <div class="slds-text-title slds-text-color_weak">Workflow Output</div>
                                            <pre class="code-block">{selectedInst.Output__c}</pre>
                                            <template if:true={selectedInst.outputFile}>
                                                <a href={selectedInst.outputFile.url} target="_blank" rel="noopener" class="slds-text-body_small">{selectedInst.outputFile.label}</a>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:true={selectedInst.Progress__c}>
                                        <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                                            <div class="slds-text-title slds-text-color_weak">Workflow Progress</div>
                                            <pre class="code-block">{selectedInst.Progress__c}</pre>
                                            <template if:true={selectedInst.progressFile}>
                                                <a href={selectedInst.progressFile.url} target="_blank" rel="noopener" class="slds-text-body_small">{selectedInst.progressFile.label}</a>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:true={isRollbackIncomplete}>
                                        <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                                            <div class="slds-text-title text-red">Rollback Incomplete</div>
                                            <div class="slds-text-body_regular slds-m-bottom_x-small">
                                                This saga's rollback stalled on a failed compensation.
                                                <strong>{pendingCompensationCount}</strong> forward step(s) still have un-reversed side effects.
                                                Use <strong>Resume Rollback</strong> to finish compensating them in LIFO order.
                                            </div>
                                            <ul class="slds-list_dotted">
                                                <template for:each={pendingCompensations} for:item="comp">
                                                    <li key={comp.key} class="slds-text-body_small">{comp.name}</li>
                                                </template>
                                            </ul>
                                        </div>
                                    </template>
                                    <template if:true={selectedInst.Error_Message__c}>
                                        <div class="slds-col slds-size_1-of-1 slds-p-bottom_small">
                                            <div class="slds-text-title text-red">Workflow Failure Message</div>
                                            <pre class="code-block error-block">{selectedInst.Error_Message__c}</pre>
                                        </div>
                                    </template>
                                </div>

                                <!-- Child Workflows Section -->
                                <template if:true={hasChildren}>
                                    <div class="slds-m-bottom_large">
                                        <h3 class="slds-text-heading_small slds-m-bottom_small font-outfit">Sub-Workflows</h3>
                                        <div class="panel-card">
                                            <div class="slds-scrollable_y" style="max-height: 200px;">
                                                <ul class="slds-has-dividers_bottom-space">
                                                    <template for:each={childInstances} for:item="child">
                                                        <li key={child.Id} class="slds-p-around_small list-item clickable" data-id={child.Id} onclick={handleSelectRelatedInstance}>
                                                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                                                <div>
                                                                    <div class="slds-text-title_bold text-primary">{child.Name}</div>
                                                                    <div class="slds-text-body_small slds-text-color_weak">
                                                                        {child.Workflow_Name__c} | Key: {child.Correlation_Key__c}
                                                                    </div>
                                                                </div>
                                                                <span class={child.statusBadgeClass}>{child.Status__c}</span>
                                                            </div>
                                                        </li>
                                                    </template>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </template>

                                <!-- Step Timeline/DAG Execution History -->
                                <div>
                                    <h3 class="slds-text-heading_small slds-m-bottom_medium font-outfit">DAG Execution Path</h3>
                                    
                                    <template if:true={hasSteps}>
                                        <div class="slds-m-left_small timeline-container">
                                            <template for:each={steps} for:item="step">
                                                <div key={step.Id} class="timeline-item">
                                                    <div class="slds-grid slds-wrap">
                                                        <!-- Left: Visual Dot / Connector -->
                                                        <div class="slds-col slds-grow-none timeline-marker-col">
                                                            <div class={step.markerClass}></div>
                                                        </div>
                                                        <!-- Right: Step Info Card -->
                                                        <div class="slds-col slds-grow slds-p-bottom_medium">
                                                            <div class="step-card">
                                                                <!-- Clickable Step Header -->
                                                                <div class="clickable-header" onclick={toggleStepDetails} data-step-id={step.Id}>
                                                                    <div class="slds-grid slds-grid_align-spread slds-m-bottom_x-small">
                                                                        <span class="slds-text-title_bold text-secondary font-outfit">{step.Step_Name__c}</span>
                                                                        <span class={step.statusBadgeClass}>{step.Status__c}</span>
                                                                    </div>
                                                                    <div class="slds-text-body_small slds-text-color_weak">
                                                                        Attempted: {step.formattedDate} | Retries: {step.formattedRetryCount}
                                                                    </div>
                                                                    <div class="slds-text-body_small slds-m-top_xx-small">
                                                                        <span class={step.budgetClass}>
                                                                            <template if:true={step.hasLimitPressure}>
                                                                                <lightning-icon icon-name="utility:warning" size="xx-small" alternative-text="Limit Pressure" title="Limit Pressure >= 80%" class="slds-m-right_xx-small text-red-icon"></lightning-icon>
                                                                            </template>
                                                                            Resource Usage: {step.telemetryString}
                                                                        </span>
                                                                    </div>
                                                                </div>

                                                                <!-- Direct Sub-Workflow Link -->
                                                                <template if:true={step.childInstanceId}>
                                                                    <div class="slds-m-top_x-small slds-grid slds-grid_vertical-align-center">
                                                                        <lightning-icon icon-name="utility:link" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                                                        <span class="slds-text-body_small">
                                                                            Sub-Workflow: 
                                                                            <button type="button" data-id={step.childInstanceId} onclick={handleSelectRelatedInstance} class="slds-button link-button slds-m-left_xx-small">
                                                                                {step.childInstanceName}
                                                                            </button>
                                                                        </span>
                                                                    </div>
                                                                </template>
                                                                
                                                                <!-- Expandable Input/Output -->
                                                                <div class="slds-m-top_small">
                                                                    <lightning-button-stateful
                                                                        label-off="Show Logs / Data"
                                                                        label-on="Hide Logs / Data"
                                                                        state={step.showDetails}
                                                                        data-step-id={step.Id}
                                                                        onclick={toggleStepDetails}
                                                                        variant="text"
                                                                        icon-name-off="utility:chevrondown"
                                                                        icon-name-on="utility:chevronup"
                                                                        class="text-button">
                                                                    </lightning-button-stateful>
                                                                    
                                                                    <template if:true={step.showDetails}>
                                                                        <div class="slds-m-top_small slds-p-top_small border-top">
                                                                            <template if:true={step.Input__c}>
                                                                                <div class="slds-text-title slds-text-color_weak slds-m-bottom_xx-small">Step Input</div>
                                                                                <pre class="code-block slds-m-bottom_small">{step.Input__c}</pre>
                                                                                <template if:true={step.inputFile}>
                                                                                    <a href={step.inputFile.url} target="_blank" rel="noopener" class="slds-text-body_small slds-m-bottom_small slds-d-block">{step.inputFile.label}</a>
                                                                                </template>
                                                                            </template>
                                                                            <template if:true={step.Output__c}>
                                                                                <div class="slds-text-title slds-text-color_weak slds-m-bottom_xx-small">Step State / Output</div>
                                                                                <pre class="code-block slds-m-bottom_small">{step.Output__c}</pre>
                                                                                <template if:true={step.outputFile}>
                                                                                    <a href={step.outputFile.url} target="_blank" rel="noopener" class="slds-text-body_small slds-m-bottom_small slds-d-block">{step.outputFile.label}</a>
                                                                                </template>
                                                                            </template>
                                                                            <template if:true={step.Error_Details__c}>
                                                                                <div class="slds-text-title text-red slds-m-bottom_xx-small">Step Error Details</div>
                                                                                <pre class="code-block error-block">{step.Error_Details__c}</pre>
                                                                            </template>

                                                                            <template if:true={step.hasBreadcrumbs}>
                                                                                <div class="slds-text-title slds-text-color_weak slds-m-bottom_xx-small">Step Logs</div>
                                                                                <div class="terminal-panel slds-m-bottom_small">
                                                                                    <template for:each={step.breadcrumbs} for:item="b">
                                                                                        <div key={b.Id} class="terminal-line">
                                                                                            <span class="terminal-timestamp">[{b.formattedFireTime}]</span>
                                                                                            <span class={b.badgeClass}>{b.Level__c}</span>
                                                                                            <span class="terminal-message">{b.Message__c}</span>
                                                                                        </div>
                                                                                    </template>
                                                                                </div>
                                                                            </template>

                                                                            <template if:true={step.isEligibleForSkip}>
                                                                                <div class="slds-m-top_small slds-p-top_small border-top">
                                                                                    <div class="slds-text-title slds-text-color_weak slds-m-bottom_x-small">Resume past this failed step</div>
                                                                                    <div class="slds-form-element">
                                                                                        <label class="slds-form-element__label slds-text-body_small">
                                                                                            JSON Output Payload (supplied result for skip)
                                                                                            <div class="slds-form-element__control slds-m-bottom_small slds-m-top_xx-small">
                                                                                                <textarea 
                                                                                                    class="slds-textarea code-block" 
                                                                                                    placeholder='e.g. {"success": true}' 
                                                                                                    data-step-name={step.Step_Name__c}></textarea>
                                                                                            </div>
                                                                                        </label>
                                                                                        <lightning-button
                                                                                            label="Resume Past This Step"
                                                                                            icon-name="utility:forward"
                                                                                            variant="brand"
                                                                                            data-step-name={step.Step_Name__c}
                                                                                            onclick={handleResumePastStep}
                                                                                            class="brand-button">
                                                                                        </lightning-button>
                                                                                    </div>
                                                                                </div>
                                                                            </template>
                                                                        </div>
                                                                    </template>
                                                                </div>

                                                                <!-- Approval UI Block -->
                                                                <template if:true={step.isWaitingForApproval}>
                                                                    <div class="slds-m-top_medium slds-p-around_small border-top approval-panel">
                                                                        <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_small">
                                                                            <lightning-icon icon-name="utility:user" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                                                            <span class="slds-text-title_bold text-secondary">
                                                                                Requires Approval: {step.approvalRole} (Key: {step.approvalKey})
                                                                            </span>
                                                                        </div>
                                                                        <lightning-textarea
                                                                            label="Comments"
                                                                            value={approvalComments}
                                                                            placeholder="Explain the approval/rejection decision..."
                                                                            onchange={handleCommentsChange}
                                                                            class="slds-m-bottom_small"
                                                                            variant="label-hidden">
                                                                        </lightning-textarea>
                                                                        <div class="slds-grid slds-grid_align-end">
                                                                            <lightning-button
                                                                                label="Reject"
                                                                                variant="destructive"
                                                                                icon-name="utility:close"
                                                                                data-key={step.approvalKey}
                                                                                data-approved="false"
                                                                                onclick={handleApprovalSubmit}
                                                                                class="slds-m-right_small">
                                                                            </lightning-button>
                                                                            <lightning-button
                                                                                label="Approve"
                                                                                variant="success"
                                                                                icon-name="utility:check"
                                                                                data-key={step.approvalKey}
                                                                                data-approved="true"
                                                                                onclick={handleApprovalSubmit}
                                                                                class="brand-button">
                                                                            </lightning-button>
                                                                        </div>
                                                                    </div>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:false={hasSteps}>
                                        <div class="slds-text-color_weak slds-p-around_medium border-dashed slds-align_absolute-center">
                                            No step execution history recorded yet.
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </template>
                    
                    <template if:false={selectedInstanceId}>
                        <div class="slds-align_absolute-center slds-p-around_xx-large spinner-height slds-flex_column slds-text-align_center">
                            <lightning-icon icon-name="utility:graph" size="large" class="slds-m-bottom_medium text-weak-icon"></lightning-icon>
                            <h2 class="slds-text-heading_medium font-outfit text-weak">No Workflow Selected</h2>
                            <p class="slds-text-color_weak slds-m-top_x-small">Select a workflow instance from the list to view its DAG path, state values, and execution steps.</p>
                        </div>
                    </template>
                        </template>
                        </template>
                        </template>
                    </template>

                </div>
            </div>
        </div>
        </template>

        <!-- Re-drive Confirmation Modal -->
        <template if:true={redriveModalOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="redrive-modal-title" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon
                            icon-name="utility:close"
                            onclick={handleRedriveModalClose}
                            alternative-text="Close"
                            variant="bare"
                            class="slds-button slds-button_icon slds-modal__close">
                        </lightning-button-icon>
                        <h2 id="redrive-modal-title" class="slds-modal__title slds-hyphenate font-outfit">Re-drive Failed Instances</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-text-body_regular slds-m-bottom_small">
                             <strong>{redriveCount}</strong> failed workflow instance{redrivePluralSuffix} match the current filter and will be re-driven.
                        </p>
                        <p class="slds-text-color_weak slds-text-body_small">
                            Each instance is recovered through the standard retry path, asynchronously, in safe-sized chunks. Already-recovered instances are skipped automatically.
                        </p>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Never Mind" onclick={handleRedriveModalClose} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Re-drive Instances" variant="brand" icon-name="utility:redo" onclick={handleRedriveModalConfirm} class="brand-button"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
        </template>

        <!-- Cancel Matching Confirmation Modal -->
        <template if:true={cancelMatchingModalOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="cancel-matching-modal-title" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header slds-theme_error">
                        <lightning-button-icon
                            icon-name="utility:close"
                            onclick={handleCancelMatchingModalClose}
                            alternative-text="Close"
                            variant="bare"
                            class="slds-button slds-button_icon slds-modal__close">
                        </lightning-button-icon>
                        <h2 id="cancel-matching-modal-title" class="slds-modal__title slds-hyphenate font-outfit">Cancel Active Instances</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-text-body_regular slds-m-bottom_small">
                            <strong>{cancelMatchingCount}</strong> active workflow instance{cancelPluralSuffix} match the current filter and will be cancelled.
                        </p>
                        <p class="slds-text-color_weak slds-text-body_small">
                            Each matching instance will be cancelled asynchronously in safe-sized chunks. In-flight Queueables/steps will terminate cleanly and stop without enqueuing further work. Compensation stack integrity is preserved as Compensating status is excluded by default.
                        </p>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Never Mind" onclick={handleCancelMatchingModalClose} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Cancel Instances" variant="destructive" icon-name="utility:close" onclick={handleCancelMatchingModalConfirm}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
        </template>

        <!-- Cancel Workflow Modal -->
        <template if:true={cancelModalOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="cancel-modal-title" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header slds-theme_error">
                        <lightning-button-icon
                            icon-name="utility:close"
                            onclick={handleCancelModalClose}
                            alternative-text="Close"
                            variant="bare"
                            class="slds-button slds-button_icon slds-modal__close">
                        </lightning-button-icon>
                        <h2 id="cancel-modal-title" class="slds-modal__title slds-hyphenate font-outfit">Cancel Workflow</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-text-body_regular slds-m-bottom_medium">How should this workflow be cancelled?</p>
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <div class="stat-card slds-p-around_medium">
                                    <div class="slds-text-title_bold slds-m-bottom_x-small">Run Saga Compensations</div>
                                    <p class="slds-text-body_small slds-text-color_weak">Roll back completed steps in reverse order before stopping. Recommended for workflows with side effects.</p>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <div class="stat-card slds-p-around_medium">
                                    <div class="slds-text-title_bold slds-m-bottom_x-small">Abort Immediately</div>
                                    <p class="slds-text-body_small slds-text-color_weak">Stop the workflow now without running any compensations. Use when speed matters more than cleanup.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Never Mind" onclick={handleCancelModalClose} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Abort Immediately" variant="destructive" icon-name="utility:close" data-compensate="false" onclick={handleCancelModalConfirm} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Run Compensations" variant="neutral" icon-name="utility:undo" data-compensate="true" onclick={handleCancelModalConfirm}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
        </template>

        <!-- Pause / Resume Confirmation Modal -->
        <template if:true={pauseModalOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="pause-modal-title" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon
                            icon-name="utility:close"
                            onclick={handleClosePauseModal}
                            alternative-text="Close"
                            variant="bare"
                            class="slds-button slds-button_icon slds-modal__close">
                        </lightning-button-icon>
                        <h2 id="pause-modal-title" class="slds-modal__title slds-hyphenate font-outfit">{pauseModalTitle}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <template if:true={pauseModalIsResume}>
                            <p class="slds-text-body_regular slds-m-bottom_medium">
                                Resume <strong>{pauseModalTarget}</strong>? All parked (Paused) instances will be transitioned back to Running and re-enqueued.
                            </p>
                        </template>
                        <template if:false={pauseModalIsResume}>
                            <p class="slds-text-body_regular slds-m-bottom_medium">
                                Pause <strong>{pauseModalTarget}</strong>? Steps currently executing will complete; the engine will park at each handoff instead of enqueuing the next step. In-flight progress is preserved.
                            </p>
                            <lightning-input
                                label="Reason (optional)"
                                placeholder="e.g. INC-1234 downstream API outage"
                                value={pauseModalReason}
                                onchange={handlePauseReasonChange}>
                            </lightning-input>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleClosePauseModal} class="slds-m-right_small"></lightning-button>
                        <template if:true={pauseModalIsResume}>
                            <lightning-button label="Confirm Resume" variant="brand" icon-name="utility:play" onclick={handleConfirmPauseModal}></lightning-button>
                        </template>
                        <template if:false={pauseModalIsResume}>
                            <lightning-button label="Confirm Pause" variant="destructive" icon-name="utility:pause" onclick={handleConfirmPauseModal}></lightning-button>
                        </template>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
        </template>

        <!-- Launch Workflow Modal -->
        <template if:true={modalOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon
                            icon-name="utility:close"
                            onclick={handleCloseModal}
                            alternative-text="Close"
                            variant="bare"
                            class="slds-button slds-button_icon slds-modal__close">
                        </lightning-button-icon>
                        <h2 class="slds-modal__title slds-hyphenate font-outfit">Run Workflow / Backfill</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <!-- Alert Banner for errors -->
                        <template if:true={launchError}>
                            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                                <h2>{launchError}</h2>
                            </div>
                        </template>

                        <lightning-combobox
                            name="launchName"
                            label="Workflow Definition"
                            placeholder="Select workflow class..."
                            value={launchName}
                            options={definitionOptions}
                            onchange={handleLaunchFieldChange}
                            required>
                        </lightning-combobox>

                        <lightning-input
                            name="launchKey"
                            label="Correlation Key (Unique)"
                            placeholder="e.g. Backfill_June_01"
                            value={launchKey}
                            onchange={handleLaunchFieldChange}
                            required>
                        </lightning-input>

                        <lightning-textarea
                            name="launchInputJson"
                            label="Input Payload (JSON)"
                            placeholder='e.g. { "records": [1, 2, 3] }'
                            value={launchInputJson}
                            onchange={handleLaunchFieldChange}
                            rows="6"
                            class="slds-m-top_small">
                        </lightning-textarea>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleCloseModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Execute Workflow" variant="brand" onclick={handleExecuteWorkflow} loading={executingLaunch} disabled={executingLaunch} class="brand-button"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
        </template>

        <!-- Compensate Confirmation Modal -->
        <template if:true={compensateModalOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="compensate-modal-title" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon
                            icon-name="utility:close"
                            alternative-text="Close"
                            variant="bare"
                            onclick={handleCloseCompensateModal}
                            class="slds-button slds-button_icon slds-modal__close">
                        </lightning-button-icon>
                        <h2 id="compensate-modal-title" class="slds-modal__title slds-hyphenate font-outfit">Manually Compensate Workflow</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>Are you sure you want to compensate this completed workflow instance?</p>
                        <p class="slds-m-top_small slds-text-color_weak">This will spawn a new compensating workflow instance (linked via Previous Instance) to execute all compensatable steps in reverse order with a full audit trail.</p>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Never Mind" onclick={handleCloseCompensateModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Compensate" variant="brand" icon-name="utility:undo" onclick={handleConfirmCompensate} class="brand-button"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
        </template>

        <!-- Send Signal Modal -->
        <template if:true={signalModalOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="signal-modal-title" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon
                            icon-name="utility:close"
                            onclick={handleSignalModalClose}
                            alternative-text="Close"
                            variant="bare"
                            class="slds-button slds-button_icon slds-modal__close"
                            data-id="close-signal-modal"
                            disabled={loadingDetails}>
                        </lightning-button-icon>
                        <h2 id="signal-modal-title" class="slds-modal__title slds-hyphenate font-outfit">Send Signal</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-text-body_regular slds-m-bottom_medium">
                            Inject a named signal directly into this stuck instance. The signal will follow the standard at-least-once routing and idempotency guarantees.
                        </p>
                        <lightning-input
                            label="Signal Name"
                            value={signalName}
                            onchange={handleSignalNameChange}
                            required
                            placeholder="e.g. PaymentConfirmed"
                            class="slds-m-bottom_small signal-name-input"
                            data-id="signal-name-input">
                        </lightning-input>
                        <lightning-textarea
                            label="Payload JSON (Optional)"
                            value={signalPayload}
                            onchange={handleSignalPayloadChange}
                            placeholder='e.g. {"amount": 100, "status": "success"}'
                            rows="5"
                            class="slds-m-bottom_small signal-payload-input"
                            data-id="signal-payload-input">
                        </lightning-textarea>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={handleSignalModalClose} class="slds-m-right_small" data-id="cancel-signal-btn" disabled={loadingDetails}></lightning-button>
                        <lightning-button label="Send Signal" variant="brand" icon-name="utility:send" onclick={handleSignalModalConfirm} class="brand-button" disabled={isSendSignalDisabled} data-id="confirm-signal-btn"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
        </template>
    </div>
</template>
